<svg width="1000" height="1500" viewBox="0 0 1000 1500" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Gradient for the matte charcoal body -->
  <linearGradient id="bodyGradient" x1="500" y1="0" x2="500" y2="1500" gradientUnits="userSpaceOnUse">
    <stop offset="0" stop-color="#1A1A1A"/>
    <stop offset="0.5" stop-color="#262626"/>
    <stop offset="1" stop-color="#0A0A0A"/>
  </linearGradient>

  <!-- Head/Visor Silhouette -->
  <path d="M500 100C410 100 340 170 340 260C340 350 410 420 500 420C590 420 660 350 660 260C660 170 590 100 500 100Z" fill="url(#bodyGradient)"/>
  <path d="M500 130C430 130 370 190 370 260C370 330 430 390 500 390C570 390 630 330 630 260C630 190 570 130 500 130Z" fill="#000000" fill-opacity="0.8"/>
  
  <!-- Neck -->
  <path d="M450 420H550L530 460H470L450 420Z" fill="#1A1A1A"/>

  <!-- Torso/Shoulders Silhouette -->
  <path d="M500 460C350 460 250 500 200 600C150 750 200 1000 200 1000L500 1100L800 1000C800 1000 850 750 800 600C750 500 650 460 500 460Z" fill="url(#bodyGradient)"/>

  <!-- Glowing Torso Stripe -->
  <rect x="498" y="550" width="4" height="400" rx="2" fill="white" fill-opacity="0.8">
    <animate attributeName="fill-opacity" values="0.4;0.9;0.4" dur="3s" repeatCount="indefinite" />
  </rect>
  
  <!-- Glow Effect (Chest) -->
  <circle cx="500" cy="550" r="30" fill="white" fill-opacity="0.1">
    <animate attributeName="r" values="25;35;25" dur="3s" repeatCount="indefinite" />
  </circle>

  <!-- Arm Silhouettes -->
  <path d="M200 600C200 600 150 700 140 850C130 1000 160 1200 160 1200" stroke="#1A1A1A" stroke-width="80" stroke-linecap="round"/>
  <path d="M800 600C800 600 850 700 860 850C870 1000 840 1200 840 1200" stroke="#1A1A1A" stroke-width="80" stroke-linecap="round"/>
</svg>
